name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies & Build Web
        run: |
          cd pcos-frontend
          npm install
          npm run build
          npx cap sync android

      - name: Build Android APK
        run: |
          cd pcos-frontend/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: LunaFlow-App
          path: pcos-frontend/android/app/build/outputs/apk/debug/app-debug.apk
